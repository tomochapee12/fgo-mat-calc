name: Update FGO Data
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

concurrency:
  group: update-fgo-data-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Run incremental update
        run: npm run data:update

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain -- data/ public/faces/ public/items/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit data and image changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/faces/ public/items/
          git commit -m "chore: update servant/item data"
          git pull --rebase origin main

      - name: Build updated app
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Push data and image changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push origin HEAD:main

      - name: Deploy updated app to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fgo-mat-calc
